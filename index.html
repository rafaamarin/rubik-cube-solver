<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070a" />
    <title>Rubik Solver Game</title>
    <style>
      html,
      body,
      #app,
      #scene-root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #030406;
      }

      body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div id="scene-root" aria-label="Rubik cube playfield">
        <div id="renderFallback" class="render-fallback" role="status">
          <strong id="renderFallbackTitle">Preparing cube</strong>
          <span id="renderFallbackDetail">Loading the 3D board.</span>
        </div>
      </div>

      <div class="hud" aria-live="polite">
        <section class="objective-chip" aria-label="Game status">
          <span class="eyebrow">Rubik Solver</span>
          <strong id="objectiveText">Reverse the scramble</strong>
          <span id="statusText">12 moves left</span>
          <span id="assistText">Hint reveals the next turn.</span>
        </section>

        <nav class="action-bar" aria-label="Game actions">
          <button type="button" id="newScrambleButton">New</button>
          <button type="button" id="hintButton">Hint</button>
          <button type="button" id="stepButton">Step</button>
          <button type="button" id="undoButton">Undo</button>
          <button type="button" id="resetViewButton">View</button>
        </nav>

        <section class="move-pad" aria-label="Cube moves">
          <div class="move-buttons">
            <button type="button" data-face="R">R</button>
            <button type="button" data-face="L">L</button>
            <button type="button" data-face="U">U</button>
            <button type="button" data-face="D">D</button>
            <button type="button" data-face="F">F</button>
            <button type="button" data-face="B">B</button>
          </div>
          <div class="move-toggles">
            <button type="button" id="inverseToggle" aria-pressed="false">Inv</button>
            <button type="button" id="doubleToggle" aria-pressed="false">2x</button>
          </div>
        </section>

        <section id="guidePanel" class="guide-panel" hidden aria-live="polite">
          <span id="guideKicker" class="eyebrow">Hint</span>
          <strong id="guideMove">R</strong>
          <span id="guideText">Follow the highlighted slice.</span>
        </section>

        <section id="completionPanel" class="completion-panel" hidden>
          <span class="eyebrow">Solved</span>
          <strong id="completionTime">0:00.000</strong>
          <span id="bestTime">Best 0:00.000</span>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
